<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DataShare V5</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navigation -->

<nav>

<div class="logo">

📶 DataShare

</div>

<div class="menu">

<a href="#">Home</a>

<a href="#offers">Offers</a>

<a href="#post">Post Offer</a>

<a href="#">About</a>

<a href="#">Contact</a>

</div>

</nav>

<!-- Hero Section -->

<section class="hero">

<h1>

Share Your Unused Mobile Data

</h1>

<p>

Help others by sharing or selling your unused mobile data.

</p>

</section>

<div class="container">

<!-- Login -->

<div class="box">

<h2>

Login / Signup

</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="signup()">

Sign Up

</button>

<button onclick="login()">

Login

</button>

<button onclick="logout()">

Logout

</button>

<p id="currentUser">

Not Logged In

</p>

</div>

<!-- Post Offer -->

<div
class="box"
id="post">

<h2>

Post Data Offer

</h2>

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<select id="network">

<option value="">

Select Network

</option>

<option>Jio</option>

<option>Airtel</option>

<option>Vi</option>

<option>BSNL</option>

</select>

<input
type="number"
id="data"
placeholder="Available Data (GB)">

<input
type="text"
id="location"
placeholder="Location">

<input
type="date"
id="validity">

<button onclick="addOffer()">

Post Offer

</button>

</div>
<!-- Search -->

<input
type="text"
id="searchBox"
placeholder="🔍 Search by Name, Network or Location">

<!-- Offers -->

<h2 id="offers">

Available Data Offers

</h2>

<div id="offerList">

</div>

<!-- Statistics -->

<div class="stats">

<div class="stat">

<h3 id="offerCount">0</h3>

<p>Offers</p>

</div>

<div class="stat">

<h3 id="userCount">0</h3>

<p>Users</p>

</div>

<div class="stat">

<h3 id="dataCount">0 GB</h3>

<p>Total Data</p>

</div>

</div>

</div>

<footer>

<p>

© 2026 DataShare | Built by Shiva Kumar

</p>

</footer>

<script src="script.js"></script>

<script type="module" src="firebase.js"></script>

</body>

</html>
