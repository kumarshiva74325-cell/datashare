```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataShare V3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:bold;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.form-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
margin-bottom:30px;
}

.form-box h2{
color:#111827;
margin-bottom:20px;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
padding:14px 25px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.delete-btn{
background:#dc2626;
margin-left:10px;
}

.delete-btn:hover{
background:#b91c1c;
}

.offers-title{
text-align:center;
font-size:35px;
margin-bottom:20px;
}

.offer-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
color:black;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card h3{
margin-bottom:10px;
color:#1e3a8a;
}

.card p{
margin-bottom:8px;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

.stat-box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
text-align:center;
min-width:200px;
}

.stat-box h2{
font-size:40px;
}

footer{
text-align:center;
padding:25px;
margin-top:50px;
background:rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<nav>
<div class="logo">📶 DataShare</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Offers</a>
<a href="#">Profile</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<h1>Share Your Unused Data</h1>
<p>Connect with people and help them stay online.</p>
</section>

<div class="container">

<div class="form-box">

<h2>Post Data Offer</h2>

<input type="text" id="name" placeholder="Enter Name">

<input type="tel" id="mobile" placeholder="Mobile Number">

<select id="network">
<option value="">Select Network</option>
<option>Jio</option>
<option>Airtel</option>
<option>Vi</option>
<option>BSNL</option>
</select>

<input type="number" id="data" placeholder="Available Data (GB)">

<input type="text" id="location" placeholder="Location">

<input type="date" id="validity">

<button onclick="addOffer()">Post Offer</button>

</div>

<input
type="text"
id="searchBox"
placeholder="🔍 Search Offers"
onkeyup="displayOffers()">

<br><br>

<h2 class="offers-title">Available Offers</h2>

<div class="offer-grid" id="offers"></div>

</div>

<div class="stats">

<div class="stat-box">
<h2 id="offerCount">0</h2>
<p>Offers Posted</p>
</div>

<div class="stat-box">
<h2 id="userCount">0</h2>
<p>Users</p>
</div>

<div class="stat-box">
<h2 id="dataCount">0</h2>
<p>Total GB</p>
</div>

</div>

<footer>
<p>© 2026 DataShare | Built by Shiva Kumar</p>
</footer>

<script>

let offers =
JSON.parse(localStorage.getItem("offers")) || [];

function addOffer(){

const name=document.getElementById("name").value;
const mobile=document.getElementById("mobile").value;
const network=document.getElementById("network").value;
const data=document.getElementById("data").value;
const location=document.getElementById("location").value;
const validity=document.getElementById("validity").value;

if(!name || !network || !data){
alert("Please fill all required fields");
return;
}

offers.push({
name,
mobile,
network,
data,
location,
validity
});

localStorage.setItem(
"offers",
JSON.stringify(offers)
);

displayOffers();

document.getElementById("name").value="";
document.getElementById("mobile").value="";
document.getElementById("network").value="";
document.getElementById("data").value="";
document.getElementById("location").value="";
document.getElementById("validity").value="";
}

function displayOffers(){

let html="";
let totalData=0;

const search=
document.getElementById("searchBox")
? document.getElementById("searchBox").value.toLowerCase()
: "";

offers.forEach((offer,index)=>{

if(
!offer.name.toLowerCase().includes(search) &&
!offer.network.toLowerCase().includes(search) &&
!(offer.location || "").toLowerCase().includes(search)
){
return;
}

totalData += Number(offer.data);

html += `
<div class="card">

<h3>${offer.name}</h3>

<p>📱 ${offer.mobile || "Not Provided"}</p>

<p>📶 ${offer.network}</p>

<p><strong>${offer.data} GB Available</strong></p>

<p>📍 ${offer.location || "-"}</p>

<p>📅 ${offer.validity || "-"}</p>

<button onclick="requestOffer('${offer.name}')">
Request Data
</button>

<button
class="delete-btn"
onclick="deleteOffer(${index})">
Delete
</button>

</div>
`;

});

document.getElementById("offers").innerHTML=html;

document.getElementById("offerCount").innerText=
offers.length;

document.getElementById("userCount").innerText=
offers.length;

document.getElementById("dataCount").innerText=
totalData;
}

function requestOffer(name){

alert("Request sent to " + name);

}

function deleteOffer(index){

offers.splice(index,1);

localStorage.setItem(
"offers",
JSON.stringify(offers)
);

displayOffers();

}

displayOffers();

</script>

</body>
</html>
```
