<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DataShare V6</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

<div class="logo">
📶 DataShare
</div>

<div class="nav-links">

<a href="#home">Home</a>

<a href="#offers-section">Offers</a>

<a href="#post-section">Post Offer</a>

<button id="logoutBtn" class="hidden">
Logout
</button>

</div>

</nav>


<section class="hero" id="home">

<h1>
Share Your Unused Data
</h1>

<p>
Connect with people and help them stay online.
</p>

</section>


<main class="container">


<!-- LOGIN SECTION -->

<section class="box">

<h2>
User Account
</h2>

<p id="currentUser">
Not Logged In
</p>

<br>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="signupBtn">
Sign Up
</button>

<button id="loginBtn">
Login
</button>

</section>


<!-- POST OFFER SECTION -->

<section
class="box"
id="post-section">

<h2>
Post Data Offer
</h2>

<form id="offerForm">

<input
type="text"
id="name"
placeholder="Your Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<select
id="network"
required>

<option value="">
Select Network
</option>

<option>
Jio
</option>

<option>
Airtel
</option>

<option>
Vi
</option>

<option>
BSNL
</option>

</select>

<input
type="number"
id="data"
placeholder="Available Data (GB)"
min="0.1"
step="0.1"
required>

<input
type="text"
id="location"
placeholder="Location">

<input
type="date"
id="validity">

<button
type="submit">

Post Offer

</button>

</form>

</section>


<!-- SEARCH SECTION -->

<section
id="offers-section">

<input
type="search"
id="searchBox"
placeholder="🔍 Search by Name, Network or Location">


<h2
class="offers-title">

Available Data Offers

</h2>


<div
id="offerList"
class="offer-grid">

<p>
Login to view offers.
</p>

</div>

</section>


<!-- STATISTICS -->

<section
class="stats">


<div
class="stat">

<h3
id="offerCount">

0

</h3>

<p>
Offers
</p>

</div>


<div
class="stat">

<h3
id="userCount">

0

</h3>

<p>
Users
</p>

</div>


<div
class="stat">

<h3
id="dataCount">

0 GB

</h3>

<p>
Total Data
</p>

</div>


</section>

</main>


<footer>

<p>
© 2026 DataShare | Built by Shiva Kumar
</p>

</footer>


<script
type="module"
src="firebase.js">

</script>
<script type="module" src="script.js"></script>
</body>

</html>
